openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: NUTTER-XMD SaaS platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: WhatsApp bot (one per user)
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bot:
    get:
      operationId: getMyBot
      tags: [bot]
      summary: Get the current user's bot (auto-creates if not exists)
      responses:
        "200":
          description: Bot object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
        "401":
          description: Unauthorized
    put:
      operationId: updateMyBot
      tags: [bot]
      summary: Update the current user's bot settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBotBody"
      responses:
        "200":
          description: Updated bot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /bot/qr:
    get:
      operationId: getBotQR
      tags: [bot]
      summary: Get QR code for WhatsApp connection
      responses:
        "200":
          description: QR code data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QRData"
        "401":
          description: Unauthorized

  /bot/pair:
    post:
      operationId: getBotPairCode
      tags: [bot]
      summary: Request a pairing code for phone number link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairCodeBody"
      responses:
        "200":
          description: Pairing code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairCodeData"
        "400":
          description: Bad request
        "401":
          description: Unauthorized

  /bot/disconnect:
    post:
      operationId: disconnectBot
      tags: [bot]
      summary: Disconnect the bot from WhatsApp
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
        "401":
          description: Unauthorized

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Admin token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminToken"
        "401":
          description: Unauthorized

  /admin/bots:
    get:
      operationId: adminListAllBots
      tags: [admin]
      summary: List all bots on the platform
      responses:
        "200":
          description: All bots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bot"
        "401":
          description: Unauthorized

  /admin/bots/{id}/activate:
    post:
      operationId: adminActivateBot
      tags: [admin]
      summary: Activate a bot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activated bot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /admin/bots/{id}/deactivate:
    post:
      operationId: adminDeactivateBot
      tags: [admin]
      summary: Deactivate a bot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deactivated bot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get platform stats
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Unauthorized

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Bot:
      type: object
      required:
        - id
        - userId
        - name
        - status
        - isActive
        - prefix
        - mode
        - autoReply
        - antiCall
        - antiLink
        - antiSpam
        - welcomeMessage
        - goodbyeMessage
        - autoRead
        - typingStatus
        - alwaysOnline
        - autoStatus
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [online, offline, connecting, banned]
        isActive:
          type: boolean
        phoneNumber:
          type: string
          nullable: true
        prefix:
          type: string
        mode:
          type: string
          enum: [private, public]
        autoReply:
          type: boolean
        autoReplyMessage:
          type: string
          nullable: true
        antiCall:
          type: boolean
        antiLink:
          type: boolean
        antiSpam:
          type: boolean
        welcomeMessage:
          type: boolean
        goodbyeMessage:
          type: boolean
        autoRead:
          type: boolean
        typingStatus:
          type: boolean
        alwaysOnline:
          type: boolean
        autoStatus:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UpdateBotBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        prefix:
          type: string
          minLength: 1
          maxLength: 5
        mode:
          type: string
          enum: [private, public]
        autoReply:
          type: boolean
        autoReplyMessage:
          type: string
        antiCall:
          type: boolean
        antiLink:
          type: boolean
        antiSpam:
          type: boolean
        welcomeMessage:
          type: boolean
        goodbyeMessage:
          type: boolean
        autoRead:
          type: boolean
        typingStatus:
          type: boolean
        alwaysOnline:
          type: boolean
        autoStatus:
          type: boolean

    QRData:
      type: object
      required: [status]
      properties:
        status:
          type: string
        qrCode:
          type: string
          nullable: true
          description: Base64-encoded QR code image

    PairCodeBody:
      type: object
      required: [phoneNumber]
      properties:
        phoneNumber:
          type: string
          description: Phone number with country code (e.g. +254712345678)

    PairCodeData:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: 8-digit pairing code

    AdminLoginBody:
      type: object
      required: [username, key]
      properties:
        username:
          type: string
        key:
          type: string

    AdminToken:
      type: object
      required: [token]
      properties:
        token:
          type: string

    AdminStats:
      type: object
      required: [totalUsers, totalBots, activeBots, onlineBots]
      properties:
        totalUsers:
          type: integer
        totalBots:
          type: integer
        activeBots:
          type: integer
        onlineBots:
          type: integer
